# DigitalOcean droplet - multi-app nginx config
# All hostnames point to this droplet; nginx routes by server_name

# Portfolio - akshaybhatnagar.in, www
server {
    listen 80;
    listen [::]:80;
    server_name akshaybhatnagar.in www.akshaybhatnagar.in;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# To-Do App
server {
    listen 80;
    listen [::]:80;
    server_name todo.akshaybhatnagar.in;

    location / {
